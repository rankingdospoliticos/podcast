name: Podcast bot

on:
  # Manual: Actions → Run workflow = mesmo job que o schedule (playlist + faltantes no feed).
  workflow_dispatch:
  schedule:
    # UTC: segunda 01:00 ≈ domingo 22:00 BRT (UTC-3)
    - cron: "0 1 * * 1"
    # UTC: segunda 15:00 = segunda 12:00 BRT
    - cron: "0 15 * * 1"

permissions:
  contents: write

concurrency:
  group: podcast-bot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          stack: ipv4
          mode: client

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -U --pre "yt-dlp[default]"

      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          python <<'PY'
          import os
          import re
          from pathlib import Path

          c = os.environ.get("YOUTUBE_COOKIES", "")
          p = Path("cookies.txt")
          p.write_text(c, encoding="utf-8", newline="\n")
          if p.stat().st_size < 32:
              raise SystemExit(
                  "YOUTUBE_COOKIES ausente ou muito curto; "
                  "cole o conteúdo de cookies.txt (Netscape) no secret."
              )
          text = p.read_text(encoding="utf-8", errors="replace")
          if not re.search(r"youtube\.com", text, re.I):
              raise SystemExit(
                  "cookies.txt não contém linhas para youtube.com; "
                  "exporte cookies do domínio YouTube (formato Netscape)."
              )
          if not re.search(
              r"\b(SID|HSID|SSID|SAPISID|__Secure-1PSID|LOGIN_INFO)\b",
              text,
              re.I,
          ):
              raise SystemExit(
                  "cookies.txt sem cookies típicos de sessão YouTube (ex.: SID, __Secure-1PSID). "
                  "Refaça o export (recomendado: janela anónima + https://www.youtube.com/robots.txt)."
              )
          print("cookies.txt: tamanho OK, domínio youtube.com e nomes de cookie esperados.")
          PY

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run publisher
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          YOUTUBE_PLAYLIST_URL: ${{ secrets.YOUTUBE_PLAYLIST_URL }}
          MIN_VIDEO_AGE_SECONDS: ${{ secrets.MIN_VIDEO_AGE_SECONDS }}
          YTDLP_EXTRACTOR_ARGS: ${{ vars.YTDLP_EXTRACTOR_ARGS }}
        run: |
          for attempt in 1 2 3; do
            echo "=== Tentativa ${attempt} de 3 ==="
            if python main.py; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Falhou; aguardando 15 min antes da próxima tentativa..."
              sleep 900
            fi
          done
          exit 1

      - name: Commit feed.xml if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          if git diff --staged --quiet; then
            echo "feed.xml inalterado no repositório"
          else
            git commit -m "chore: atualiza feed do podcast [skip ci]"
            git push
          fi
