name: Podcast bot

on:
  # Manual: Actions → Run workflow = mesmo job que o schedule (playlist + faltantes no feed).
  workflow_dispatch:
  schedule:
    # UTC: segunda 01:00 ≈ domingo 22:00 BRT (UTC-3)
    - cron: "0 1 * * 1"
    # UTC: segunda 15:00 = segunda 12:00 BRT
    - cron: "0 15 * * 1"

permissions:
  contents: write

concurrency:
  group: podcast-bot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: powershell
        run: python -m pip install -r requirements.txt

      - name: Run publisher
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          YOUTUBE_PLAYLIST_URL: ${{ secrets.YOUTUBE_PLAYLIST_URL }}
          MIN_VIDEO_AGE_SECONDS: ${{ secrets.MIN_VIDEO_AGE_SECONDS }}
          YTDLP_EXTRACTOR_ARGS: ${{ vars.YTDLP_EXTRACTOR_ARGS }}
        shell: powershell
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            Write-Host "=== Tentativa $attempt de 3 ==="
            python main.py
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($attempt -lt 3) {
              Write-Host "Falhou; aguardando 15 min antes da próxima tentativa..."
              Start-Sleep -Seconds 900
            }
          }
          exit 1

      - name: Commit feed.xml if changed
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --staged --quiet
          if ($LASTEXITCODE -eq 1) {
            git commit -m "chore: atualiza feed do podcast [skip ci]"
            git push
          } else {
            Write-Host "feed.xml inalterado no repositório"
          }
