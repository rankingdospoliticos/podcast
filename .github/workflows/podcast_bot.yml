name: Podcast bot

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "URL do vídeo no YouTube (cole o link completo)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: podcast-bot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -U --pre yt-dlp

      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          python <<'PY'
          import os
          from pathlib import Path

          c = os.environ.get("YOUTUBE_COOKIES", "")
          Path("cookies.txt").write_text(c, encoding="utf-8", newline="\n")
          if Path("cookies.txt").stat().st_size < 32:
              raise SystemExit(
                  "YOUTUBE_COOKIES ausente ou muito curto; "
                  "cole o conteúdo de cookies.txt (Netscape) no secret."
              )
          PY

      - name: Run publisher
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          YOUTUBE_URL: ${{ inputs.youtube_url }}
        run: python main.py

      - name: Commit feed.xml if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          if git diff --staged --quiet; then
            echo "feed.xml inalterado no repositório"
          else
            git commit -m "chore: atualiza feed do podcast [skip ci]"
            git push
          fi
