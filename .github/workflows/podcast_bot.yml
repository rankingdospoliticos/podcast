name: Podcast bot

on:
  workflow_dispatch:
  schedule:
    # Segundas 14:00 UTC (~11h BRT); ajuste o cron conforme a grade do podcast
    - cron: "0 14 * * 1"

permissions:
  contents: write

concurrency:
  group: podcast-bot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run publisher
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PODCAST_PUBLIC_BASE_URL: ${{ secrets.PODCAST_PUBLIC_BASE_URL }}
          AUDIO_SOURCE_URL: ${{ secrets.AUDIO_SOURCE_URL }}
        run: python main.py

      - name: Commit feed.xml if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          if git diff --staged --quiet; then
            echo "feed.xml inalterado no repositório"
          else
            git commit -m "chore: atualiza feed do podcast [skip ci]"
            git push
          fi
